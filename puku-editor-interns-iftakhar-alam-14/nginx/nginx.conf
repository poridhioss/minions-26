# ─────────────────────────────────────────────────────────────────────────
# nginx.conf — reverse proxy + static file server for the ML Tracker
#
# In production this container sits at the edge of the network. It does
# two jobs:
#
#   1. Serve the React frontend build (static files from /usr/share/nginx/html)
#   2. Reverse-proxy /api/* and /health to the FastAPI backend
#
# A single domain (the one the user typed in the browser) handles both,
# which avoids CORS preflight noise in the browser.
# ─────────────────────────────────────────────────────────────────────────

# Run as the unprivileged "nginx" user that ships in the official image.
user  nginx;
worker_processes  auto;

# Where to write error logs. access_log goes per-server below.
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    # ─── MIME types + sensible defaults ─────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Hide the "Server: nginx/x.y.z" banner in error pages.
    server_tokens off;

    # Log format with timing info — useful for spotting slow upstream calls.
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" rt=$request_time uct=$upstream_connect_time '
                      'uht=$upstream_header_time urt=$upstream_response_time';
    access_log  /var/log/nginx/access.log  main;

    # ─── Performance ────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # Cap large uploads (model artifacts can be 100s of MB). Adjust as needed.
    client_max_body_size 500m;

    # Gzip on-the-fly. Compresses text-shaped responses (JSON, HTML, CSS, JS).
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types
        application/json
        application/javascript
        text/css
        text/plain
        text/xml
        image/svg+xml;

    # ─── Upstream: the FastAPI backend ─────────────────────────────────
    # The name "backend" must match the docker-compose service name, and
    # `resolve` lets us re-resolve DNS if the container IP changes on
    # restart (safer than caching the IP).
    upstream backend_upstream {
        server backend:8000 resolve;
    }

    # ─── Server block: one server, two jobs ────────────────────────────
    server {
        listen       80;
        server_name  _;

        # ── Static frontend (React build output) ───────────────────────
        root   /usr/share/nginx/html;
        index  index.html;

        # Try the requested file, then fall back to index.html so React
        # Router's client-side routes (/experiments, /runs/42) work on
        # page refresh.
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Cache static assets aggressively. The build tool fingerprints
        # filenames (main.abcd1234.js) so this is safe.
        location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # ── Backend health (no auth) ───────────────────────────────────
        # Useful for a Kubernetes liveness probe or an uptime monitor.
        location = /health {
            proxy_pass http://backend_upstream/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Backend API ─────────────────────────────────────────────────
        # Anything under /api/ is forwarded to the FastAPI container.
        # We use proxy_http_version 1.1 + Connection: close so keep-alive
        # works correctly with uvicorn (which speaks HTTP/1.1).
        location /api/ {
            proxy_pass http://backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";

            # Long timeouts for MLflow-tracking endpoints that may take
            # several seconds to fetch a registered-model version.
            proxy_connect_timeout 30s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # ── OpenAPI / Swagger UI (handy in dev) ─────────────────────────
        location ~ ^/(docs|redoc|openapi\.json)$ {
            proxy_pass http://backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Security headers ────────────────────────────────────────────
        # Don't allow the site to be framed (clickjacking protection).
        add_header X-Frame-Options          "SAMEORIGIN" always;
        add_header X-Content-Type-Options   "nosniff" always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection         "1; mode=block" always;
    }
}

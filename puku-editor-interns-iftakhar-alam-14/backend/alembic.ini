# ─── Alembic configuration ────────────────────────────────────────────
# This file is the top-level config for the alembic CLI. It tells
# alembic where to find the migration env (env.py) and what URL
# to use. Project-specific settings live in env.py.

[alembic]
# Path to the migration scripts directory (relative to this file)
script_location = alembic

# template used to generate migration file names
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Search path for finding the env.py file
prepend_sys_path = .
version_path_separator = os

# ─── Database URL ────────────────────────────────────────────────────
# The actual URL is loaded from env.py (which reads backend/.env),
# so we leave this empty here. Setting sqlalchemy.url here would
# override it; do NOT hardcode credentials in this file.
sqlalchemy.url =

# ─── Logging ────────────────────────────────────────────────────────
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

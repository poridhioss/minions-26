version: '3.8'

services:
  # redis service
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  # fastapi server
  api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis

  # worker service
  worker:
    build: .
    command: python -u worker.py
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
# ============================================================
# Auto-registers Prometheus as a Grafana data source on startup.
# `prometheus` is the docker compose service name and resolves
# through Docker's internal DNS.
# ============================================================

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: 15s

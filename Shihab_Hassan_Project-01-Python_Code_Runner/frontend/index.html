<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Secure Python Code Runner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- CodeMirror (loaded from CDN — no build step needed) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
  <style>
    /* ── Reset & layout ───────────────────────────────────────── */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1e1e2e; color: #cdd6f4; min-height: 100vh; padding: 20px;
    }
    header { text-align: center; margin-bottom: 20px; }
    h1     { color: #89b4fa; font-size: 1.8rem; }
    .sub   { color: #a6adc8; font-size: 0.9rem; margin-top: 4px; }

    /* ── Main grid ───────────────────────────────────────────── */
    main {
      display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
      max-width: 1200px; margin: 0 auto;
    }
    @media (max-width: 800px) { main { grid-template-columns: 1fr; } }

    section {
      background: #181825; border-radius: 10px; padding: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    h2 { font-size: 1rem; color: #f5c2e7; margin-bottom: 10px; }

    .CodeMirror { height: 320px; border-radius: 6px; font-size: 0.95rem; }

    .controls { display: flex; gap: 8px; margin: 10px 0; }
    button {
      padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer;
      font-weight: 600; font-size: 0.9rem; transition: transform 0.1s;
    }
    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .run  { background: #a6e3a1; color: #1e1e2e; }
    .clear{ background: #f38ba8; color: #1e1e2e; }

    pre {
      background: #11111b; padding: 10px; border-radius: 6px;
      white-space: pre-wrap; word-wrap: break-word;
      font-family: "Fira Code", "Consolas", monospace; font-size: 0.85rem;
      max-height: 320px; overflow: auto;
    }
    .stdout { border-left: 3px solid #a6e3a1; }
    .stderr { border-left: 3px solid #f38ba8; }
    .meta   { color: #a6adc8; font-size: 0.8rem; margin-top: 6px; }

    .status-SUCCESS { color: #a6e3a1; }
    .status-ERROR   { color: #f38ba8; }
    .status-TIMEOUT { color: #fab387; }

    ul.history { list-style: none; max-height: 320px; overflow: auto; }
    ul.history li {
      padding: 8px; border-bottom: 1px solid #313244; cursor: pointer;
      display: flex; justify-content: space-between; font-size: 0.85rem;
    }
    ul.history li:hover { background: #313244; }
    .small { font-size: 0.8rem; color: #a6adc8; }
  </style>
</head>
<body>
  <header>
    <h1>🐍 Secure Python Code Runner</h1>
    <p class="sub">Sandboxed execution of untrusted Python in Docker</p>
  </header>

  <main>
    <!-- ── Editor panel ─────────────────────────────────────────── -->
    <section>
      <h2>📝 Code</h2>
      <textarea id="code">print("Hello, world!")
for i in range(5):
    print(f"i = {i}")
</textarea>
      <div class="controls">
        <button class="run" id="runBtn" onclick="runCode()">▶ Run</button>
        <button class="clear" onclick="clearOutput()">✖ Clear</button>
      </div>

      <h2 style="margin-top:14px">📤 Output</h2>
      <pre class="stdout" id="stdout">(no output yet)</pre>
      <pre class="stderr" id="stderr"></pre>
      <div class="meta" id="meta"></div>
    </section>

    <!-- ── History panel ────────────────────────────────────────── -->
    <section>
      <h2>🕒 Recent runs</h2>
      <ul class="history" id="history"><li class="small">Loading…</li></ul>
    </section>
  </main>

  <script>
    // ── CodeMirror editor setup ──────────────────────────────────
    const editor = CodeMirror.fromTextArea(document.getElementById("code"), {
      mode: "python", theme: "dracula", lineNumbers: true, indentUnit: 4
    });

    // ── Run code ─────────────────────────────────────────────────
    async function runCode() {
      const code = editor.getValue();
      const btn = document.getElementById("runBtn");
      btn.disabled = true; btn.textContent = "⏳ Running…";
      try {
        const res = await fetch("/api/run", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ code })
        });
        const data = await res.json();
        if (!res.ok) {
          document.getElementById("stdout").textContent = "(rejected by server)";
          document.getElementById("stderr").textContent = data.detail || "Error";
          document.getElementById("meta").textContent = "HTTP " + res.status;
          return;
        }
        document.getElementById("stdout").textContent = data.stdout || "(empty)";
        document.getElementById("stderr").textContent = data.stderr || "";
        const meta = document.getElementById("meta");
        meta.innerHTML = `<span class="status-${data.status}">● ${data.status}</span> · exit=${data.exit_code} · ${data.duration_ms} ms`;
        loadHistory();
      } catch (e) {
        document.getElementById("stderr").textContent = "Network error: " + e;
      } finally {
        btn.disabled = false; btn.textContent = "▶ Run";
      }
    }

    function clearOutput() {
      document.getElementById("stdout").textContent = "(cleared)";
      document.getElementById("stderr").textContent = "";
      document.getElementById("meta").textContent = "";
    }

    // ── History ──────────────────────────────────────────────────
    async function loadHistory() {
      try {
        const res = await fetch("/api/history?limit=15");
        const rows = await res.json();
        const ul = document.getElementById("history");
        if (!rows.length) { ul.innerHTML = '<li class="small">No runs yet.</li>'; return; }
        ul.innerHTML = rows.map(r => `
          <li>
            <span class="status-${r.status}">●</span>
            <span style="flex:1;margin-left:8px">${escapeHtml(r.code.slice(0, 40))}${r.code.length>40?"…":""}</span>
            <span class="small">${r.duration_ms}ms</span>
          </li>`).join("");
      } catch (e) { /* ignore */ }
    }

    function escapeHtml(s) {
      return s.replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
    }

    // Ctrl+Enter to run
    document.addEventListener("keydown", e => {
      if (e.ctrlKey && e.key === "Enter") runCode();
    });

    loadHistory();
    setInterval(loadHistory, 5000);
  </script>
</body>
</html>
